# Docker dev/test environment for Sampoorna SEO / WP Search Console Manager.
#
#   docker compose up -d            # start WordPress + DB + Adminer + tooling
#   open http://localhost:8080      # WordPress (first run: install wizard)
#   open http://localhost:8081      # Adminer (DB browser)
#   make help                       # all convenience commands
#
# The PHP "tooling" container holds Composer, PHPCS, PHPStan and the WordPress
# PHPUnit integration suite. The WordPress container is for manual/visual testing.

services:
  db:
    image: mysql:8.0
    command: ['--default-authentication-plugin=mysql_native_password']
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-wordpress}
      MYSQL_USER: ${DB_USER:-wordpress}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wordpress}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"   # host 3307 -> container 3306 (avoids clashing with a local MySQL)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:php8.1-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
        define( 'SCRIPT_DEBUG', true );
    volumes:
      - wp_data:/var/www/html
      # Live-mount plugins under test. Add a line per plugin as the suite grows.
      - ./sampoorna-seo:/var/www/html/wp-content/plugins/sampoorna-seo

  # WP-CLI. Not started by `up`; invoke with: docker compose run --rm wpcli wp <args>
  wpcli:
    image: wordpress:cli-php8.1
    depends_on:
      db:
        condition: service_healthy
    user: "33:33"   # www-data, matches the wordpress image
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
    volumes:
      - wp_data:/var/www/html
      - ./sampoorna-seo:/var/www/html/wp-content/plugins/sampoorna-seo
    profiles: ["cli"]

  adminer:
    image: adminer:4
    depends_on:
      - db
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

  # PHP 8.1 + Composer + svn/git + mysql client. Holds PHPCS/PHPStan/PHPUnit.
  # Stays running so you can `make shell` / exec into it.
  tooling:
    build:
      context: .
      dockerfile: dev/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    working_dir: /workspace
    environment:
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
      WP_CORE_DIR: /tmp/wordpress
      WP_TESTS_PHPUNIT_POLYFILLS_PATH: /workspace/vendor/yoast/phpunit-polyfills
      # Test DB (created by dev/install-wp-tests.sh) — uses root to allow DB creation.
      WPTESTS_DB_NAME: ${TEST_DB_NAME:-wordpress_test}
      WPTESTS_DB_USER: root
      WPTESTS_DB_PASS: ${DB_ROOT_PASSWORD:-root}
      WPTESTS_DB_HOST: db
    volumes:
      - .:/workspace
    command: ["tail", "-f", "/dev/null"]

  # Control plane database (Phase 4).
  cp_db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${CP_DB_USER:-cp}
      POSTGRES_PASSWORD: ${CP_DB_PASSWORD:-cp}
      POSTGRES_DB: ${CP_DB_NAME:-control_plane}
    volumes:
      - cp_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # host 5433 -> container 5432 (avoids a local Postgres clash)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CP_DB_USER:-cp}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Control plane: Node + Fastify dashboard over the signed handshake (Phase 4).
  cp:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    depends_on:
      cp_db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${CP_DB_USER:-cp}:${CP_DB_PASSWORD:-cp}@cp_db:5432/${CP_DB_NAME:-control_plane}
      # Dev AES-256-GCM key (32 bytes hex). Override in production.
      CP_VAULT_KEY: ${CP_VAULT_KEY:-1f1e1d1c1b1a191817161514131211100f0e0d0c0b0a09080706050403020100}
      SKEW_SECONDS: 300
      # Dashboard auth: seeded admin on first boot. Override in production.
      CP_ADMIN_USER: ${CP_ADMIN_USER:-admin}
      CP_ADMIN_PASSWORD: ${CP_ADMIN_PASSWORD:-changeme-dev}
      CP_SESSION_SECRET: ${CP_SESSION_SECRET:-dev-session-secret-change-me}
      # Background metric refresh of all sites every N minutes (0 disables).
      CP_REFRESH_MINUTES: ${CP_REFRESH_MINUTES:-30}
      # Background audit / citation sampling of all sites every N minutes (0 disables).
      CP_AUDIT_MINUTES: ${CP_AUDIT_MINUTES:-0}
      CP_CITATION_MINUTES: ${CP_CITATION_MINUTES:-0}
      # Google PageSpeed Insights key for the UX/CWV score (empty disables UX scoring).
      CP_PAGESPEED_KEY: ${CP_PAGESPEED_KEY:-}
      CP_PAGESPEED_STRATEGY: ${CP_PAGESPEED_STRATEGY:-mobile}
    ports:
      - "8090:3000"
    volumes:
      - ./control-plane:/app
      - cp_node_modules:/app/node_modules   # keep installed deps from the bind mount
    command: ["sh", "-c", "npm install --no-audit --no-fund && npm run migrate && npm run dev"]

volumes:
  db_data: {}
  wp_data: {}
  cp_db_data: {}
  cp_node_modules: {}
